name: Daily Content

# Lives in the PUBLIC content repo (e.g. curiovault-content). The private app
# repo stays private; only the generated daily facts (public anyway) live here.
# Served free via the jsDelivr CDN — no GitHub Pages needed.

on:
  schedule:
    # Several attempts — GitHub cron is best-effort and can be delayed/skipped.
    # The idempotency guard below means only the first successful run each day
    # actually generates; the rest are no-ops (recovery for missed slots).
    - cron: "0 5 * * *"
    - cron: "30 7 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write          # commit the generated payload (git = audit trail)

concurrency:
  group: daily-content
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Skip if today's content already exists (so the extra cron slots are
      # safe no-ops and content never regenerates/changes mid-day).
      - name: Skip if today already generated
        id: guard
        run: |
          if [ -f "content/daily/$(date -u +%F).json" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Today's content already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate + verify today's Daily Five
        if: steps.guard.outputs.exists == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-daily.mjs

      - name: Commit payload (audit trail)
        if: steps.guard.outputs.exists == 'false'
        run: |
          git config user.name "curiovault-bot"
          git config user.email "bot@curiovault.app"
          git add -f content/daily
          git commit -m "content: daily payload $(date -u +%F)" || { echo "no changes"; exit 0; }
          git push

      - name: Purge jsDelivr CDN cache
        if: steps.guard.outputs.exists == 'false'
        run: |
          DAY=$(date -u +%F)
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/content/daily/latest.json" || true
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/content/daily/$DAY.json" || true
          echo "purged"
